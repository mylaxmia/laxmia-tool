<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Responsive Preview Panels</title>
  <style>
    body {
      background: #f5f5f5;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    .preview-container {
      display: flex;
      gap: 24px;
      justify-content: center;
      align-items: flex-start;
      padding: 32px 0;
      flex-wrap: wrap;
    }
    .device-panel {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .device-label {
      margin-bottom: 12px;
      font-weight: bold;
      font-size: 1.1em;
    }
    .device-frame {
      border: 1px solid #bbb;
      border-radius: 8px;
      overflow: hidden;
      background: #222;
    }
    /* Device sizes */
    .laptop {
      width: 1440px;
      height: 900px;
      max-width: 90vw;
      max-height: 60vh;
    }
    .tablet {
      width: 768px;
      height: 1024px;
      max-width: 50vw;
      max-height: 60vh;
    }
    .mobile {
      width: 375px;
      height: 812px;
      max-width: 30vw;
      max-height: 60vh;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
    }
  </style>
</head>
<body>
  <h1 style="text-align:center; margin-top:24px;">Responsive Preview Panels</h1>
  <div class="preview-container">
    <div class="device-panel">
      <div class="device-label">Laptop/Desktop (1440x900)</div>
      <div class="device-frame laptop">
        <iframe src="app/static/index.html"></iframe>
      </div>
    </div>
    <div class="device-panel">
      <div class="device-label">Tablet/iPad (768x1024)</div>
      <div class="device-frame tablet">
        <iframe src="app/static/index.html"></iframe>
      </div>
    </div>
    <div class="device-panel">
      <div class="device-label">Mobile (375x812)</div>
      <div class="device-frame mobile">
        <iframe src="app/static/index.html"></iframe>
      </div>
    </div>
  </div>
  <p style="text-align:center; color:#888; margin-top:24px;">This page is for development/testing only. Not included in production.</p>
</body>
</html>
